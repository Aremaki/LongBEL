[vars]
dataset = "EMEA"
base_model = "../../models/camembert-bio-base"
output_root = "../../models/NER"
prediction_root = "../../results/NER_predictions"
seed = 37

[nlp]
lang = "eds"
pipeline = ["normalizer", "sentencizer", "ner"]
batch_size = 8
components = ${components}

[nlp.tokenizer]
@tokenizers = "eds.tokenizer"

[components]

[components.normalizer]
@factory = "eds.normalizer"

[components.sentencizer]
@factory = "eds.sentences"

[components.ner]
@factory = "eds.ner_crf"
mode = "joint"
window = 40

[components.ner.target_span_getter]
gold_spans = true

[components.ner.span_setter]
gold_spans = true

[components.ner.embedding]
@factory = "eds.text_cnn"
kernel_sizes = [3]

[components.ner.embedding.embedding]
@factory = "eds.transformer"
model = ${vars.base_model}
window = 500
stride = 400

[scorer]
@scorers = "eds.ner_exact_scorer"

[scorer.span_getter]
gold_spans = true

[train_data]
@readers = "bigbio_hf"
dataset_name = ${vars.dataset}
split_name = "train"
randomize = true
seed = ${vars.seed}

[val_data]
@readers = "bigbio_hf"
dataset_name = ${vars.dataset}
split_name = "validation"
randomize = false
seed = ${vars.seed}

[test_data]
@readers = "bigbio_hf"
dataset_name = ${vars.dataset}
split_name = "test"
randomize = false
seed = ${vars.seed}

[ner_train_dataloader]
batch_size = "1 samples"
grad_accumulation_max_tokens = 65536
pipe_names = ["ner"]
data = [${train_data}, ${val_data}]

[train]
nlp = ${nlp}
seed = ${vars.seed}
dataset = ${vars.dataset}
base_model = ${vars.base_model}
max_steps = 750
validation_interval = 50
early_stopping_metric = "ner/exact_ner/micro/f"
early_stopping_patience = 100
early_stopping_min_delta = 0.0
warmup_rate = 0.1
transformer_lr = 5e-05
task_lr = 5e-05
max_grad_norm = 1.0
scorer = ${scorer}
train_dataloader = [${ner_train_dataloader}]
val_data = [${test_data}]
test_data = [${test_data}]
output_root = ${vars.output_root}

[evaluate]
dataset = ${vars.dataset}
base_model = ${vars.base_model}
scorer = ${scorer}
data = [${test_data}]
output_root = ${vars.output_root}
prediction_root = ${vars.prediction_root}
model_name = "model-best"
