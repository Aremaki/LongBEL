# Reusable EDS-NLP NER config.
#
# Change only vars.dataset and vars.base_model from the command line.
# Dataset-specific paths and labels are resolved by train_ner_edsnlp.py.

# --- Experiment variables ---

[vars]
dataset = "quaero_emea"
base_model = "../../models/deberta-v3-large"
output_root = "../../models/trained_ner"
prediction_root = "../../data/predictions/ner"
seed = 37

[dataset_config]
@misc = "ner_dataset_config"
dataset = ${vars.dataset}


# --- Pipeline ---

[nlp]
lang = "eds"
pipeline = ["normalizer", "sentencizer", "ner"]
batch_size = 8
components = ${components}
tokenizer = {"@tokenizers": "eds.tokenizer"}

[components.normalizer]
@factory = "eds.normalizer"

[components.sentencizer]
@factory = "eds.sentences"


# --- NER component ---

[components.ner]
@factory = "eds.ner_crf"
mode = "joint"
window = 40
target_span_getter = ${dataset_config.span_getter}
span_setter = ["ents", "*"]
infer_span_setter = true

[components.ner.embedding]
@factory = "eds.text_cnn"
kernel_sizes = [3]

[components.ner.embedding.embedding]
@factory = "eds.transformer"
model = ${vars.base_model}
window = 256
stride = 192


# --- Scorer ---

[scorer.ner.exact_ner]
@scorers = "eds.ner_exact_scorer"
span_getter = ${dataset_config.span_getter}


# --- Validation data ---

[val_data]
[val_data.source]
@readers = "bigbio_hf"
dataset = ${dataset_config.hf_dataset}
config_name = ${dataset_config.hf_config}
split = ${dataset_config.val_split}
span_setter = ${dataset_config.span_getter}


# --- Test data ---

[test_data]
[test_data.source]
@readers = "bigbio_hf"
dataset = ${dataset_config.hf_dataset}
config_name = ${dataset_config.hf_config}
split = ${dataset_config.test_split}
span_setter = ${dataset_config.span_getter}


# --- Training dataloader ---

[ner_train_dataloader]
batch_size = 2000 words
grad_accumulation_max_tokens = ${256 * 64}
pipe_names = ["ner"]

[ner_train_dataloader.data]
randomize = true
max_length = 256
multi_sentence = true

[ner_train_dataloader.data.source]
@readers = "bigbio_hf"
dataset = ${dataset_config.hf_dataset}
config_name = ${dataset_config.hf_config}
split = ${dataset_config.train_split}
span_setter = ${dataset_config.span_getter}


# --- Train command ---

[train]
nlp = ${nlp}
seed = ${vars.seed}
dataset = ${vars.dataset}
base_model = ${vars.base_model}

max_steps = 4000
validation_interval = ${train.max_steps // 10}

early_stopping_metric = "ner/exact_ner/micro/f"
early_stopping_patience = 4
early_stopping_min_delta = 0.0

warmup_rate = 0.1
transformer_lr = 1e-5
task_lr = 5e-5
max_grad_norm = 1.0

scorer = ${scorer}
train_dataloader = [${ner_train_dataloader}]
val_data = ${val_data}
test_data = ${test_data}
output_root = ${vars.output_root}


# --- Evaluate command ---

[evaluate]
dataset = ${vars.dataset}
base_model = ${vars.base_model}
scorer = ${scorer}
data = ${test_data}
output_root = ${vars.output_root}
prediction_root = ${vars.prediction_root}
model_name = "model-best"
